name: Daily Job Agent

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'

  workflow_dispatch:

jobs:
  job-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests pandas

      - name: Run Job Agent
        run: |
          echo "Hello Kumari!"
          python main.py
